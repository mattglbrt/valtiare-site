    <circle cx="280" cy="50"  r="1.2"/>
    <circle cx="450" cy="100" r="0.9"/>
    <circle cx="1020" cy="70" r="1.1"/>
    <circle cx="1120" cy="160" r="1"/>
    <circle cx="160" cy="580" r="1"/>
    <circle cx="340" cy="620" r="1.2"/>
    <circle cx="1080" cy="540" r="1"/>
