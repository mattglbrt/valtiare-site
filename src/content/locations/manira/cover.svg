<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#141612"/>
      <stop offset="70%" stop-color="#0e0d0b"/>
      <stop offset="100%" stop-color="#0a0a09"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="40%" r="70%">
