<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#1b1915"/>
      <stop offset="100%" stop-color="#0e0d0b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#a68d42" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#3a2418" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0e0d0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- low, alert hound silhouette -->
  <g transform="translate(300 500)">
    <!-- body -->
    <path d="M-120 20 Q-130 -10 -90 -30 L-40 -45 L20 -50 L80 -45 L120 -25 Q140 -5 130 20 L130 60 L90 90 L-90 90 L-130 60 Z"
          fill="#14110e" stroke="#6b5d3e" stroke-width="1"/>
    <!-- head, looking left and alert -->
    <path d="M-160 -20 Q-170 -50 -140 -60 L-100 -55 L-80 -35 L-90 -5 L-130 10 L-155 0 Z"
          fill="#14110e" stroke="#6b5d3e" stroke-width="1"/>
    <!-- ears, pricked -->
    <path d="M-155 -50 L-160 -80 L-140 -65 Z" fill="#14110e" stroke="#6b5d3e" stroke-width="0.8"/>
    <path d="M-125 -52 L-120 -82 L-108 -64 Z" fill="#14110e" stroke="#6b5d3e" stroke-width="0.8"/>
    <!-- eye glint -->
    <circle cx="-138" cy="-35" r="1.3" fill="#a68d42"/>
    <!-- snout shadow -->
    <ellipse cx="-156" cy="-20" rx="4" ry="2" fill="#0e0d0b"/>
    <!-- tail -->
    <path d="M130 0 Q170 -10 180 -40 Q180 -20 160 0" fill="#14110e" stroke="#6b5d3e" stroke-width="0.8"/>
    <!-- four legs, grounded -->
    <rect x="-92" y="60" width="8" height="50" fill="#14110e" stroke="#6b5d3e" stroke-width="0.6"/>
    <rect x="-44" y="60" width="8" height="50" fill="#14110e" stroke="#6b5d3e" stroke-width="0.6"/>
    <rect x="40"  y="60" width="8" height="50" fill="#14110e" stroke="#6b5d3e" stroke-width="0.6"/>
    <rect x="84"  y="60" width="8" height="50" fill="#14110e" stroke="#6b5d3e" stroke-width="0.6"/>
  </g>

  <!-- hint of a glowing fire to his left, suggesting camp -->
  <circle cx="180" cy="560" r="20" fill="#a68d42" opacity="0.25"/>
  <circle cx="180" cy="560" r="8"  fill="#ffd9a0" opacity="0.55"/>

  <text x="300" y="770" text-anchor="middle" fill="#7a7468"
        font-family="Georgia, serif" font-size="14" font-style="italic" letter-spacing="2">
    Barrow
  </text>
</svg>
