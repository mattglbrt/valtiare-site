<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1a201d"/>
      <stop offset="100%" stop-color="#0e0d0b"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="32%" r="35%">
      <stop offset="0%" stop-color="#c0d4c4" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#4a6b58" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0e0d0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#halo)"/>

  <!-- slender, tall figure -->
  <path d="M240 240 Q250 160 300 150 Q350 160 360 240 L380 780 L220 780 Z"
        fill="#14110e" stroke="#6b5d3e" stroke-width="1.2"/>

  <!-- pale, elongated face -->
  <ellipse cx="300" cy="230" rx="38" ry="58" fill="#0e0d0b"/>
  <ellipse cx="300" cy="225" rx="30" ry="48" fill="#1e231f" opacity="0.7"/>

  <!-- sharp ear hints (phase elf) -->
  <path d="M270 215 L254 190 Q262 212 270 220" fill="#1e231f" stroke="#2b332b" stroke-width="0.6"/>
  <path d="M330 215 L346 190 Q338 212 330 220" fill="#1e231f" stroke="#2b332b" stroke-width="0.6"/>

  <!-- eye glints -->
  <circle cx="287" cy="230" r="1.4" fill="#c0d4c4"/>
  <circle cx="313" cy="230" r="1.4" fill="#c0d4c4"/>

  <!-- faint cool motes around her — the "half-step ahead" shimmer -->
  <g fill="#c0d4c4" opacity="0.35">
    <circle cx="250" cy="310" r="1"/>
    <circle cx="355" cy="340" r="1"/>
    <circle cx="240" cy="420" r="1"/>
    <circle cx="370" cy="460" r="1"/>
    <circle cx="260" cy="540" r="1"/>
    <circle cx="360" cy="580" r="1"/>
  </g>

  <text x="300" y="770" text-anchor="middle" fill="#7a7468"
        font-family="Georgia, serif" font-size="14" font-style="italic" letter-spacing="2">
    Triste
  </text>
</svg>
