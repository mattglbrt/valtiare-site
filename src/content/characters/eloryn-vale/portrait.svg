<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#1e1b16"/>
      <stop offset="100%" stop-color="#0a0a08"/>
    </radialGradient>
    <radialGradient id="lamp" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#a68d42" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#lamp)"/>

  <!-- robed, slightly stooped figure -->
  <path d="M220 260 Q240 180 300 170 Q360 180 380 260 L420 780 L180 780 Z"
        fill="#14110e" stroke="#6b5d3e" stroke-width="1.2"/>

  <!-- hood -->
  <path d="M230 200 Q300 140 370 200 L370 280 Q300 310 230 280 Z"
        fill="#0e0d0b" stroke="#6b5d3e" stroke-width="0.8"/>

  <!-- face — calm, shadowed -->
  <ellipse cx="300" cy="250" rx="40" ry="46" fill="#1a1714"/>
  <circle cx="286" cy="255" r="1.3" fill="#a68d42"/>
  <circle cx="314" cy="255" r="1.3" fill="#a68d42"/>
  <!-- the faintest hint of a smile -->
  <path d="M285 282 Q300 290 315 282" stroke="#6b5d3e" stroke-width="0.9" fill="none"/>

  <!-- staff held across the body, crystalline head glowing cold -->
  <line x1="170" y1="300" x2="440" y2="640" stroke="#6b5d3e" stroke-width="4"/>
  <line x1="170" y1="300" x2="440" y2="640" stroke="#8a7635" stroke-width="1.5" opacity="0.85"/>

  <!-- staff head — crystalline cluster with a cold, not-quite-warm glow -->
  <g transform="translate(170 300)">
    <circle r="22" fill="#c0d4e4" opacity="0.12"/>
    <circle r="12" fill="#c0d4e4" opacity="0.25"/>
    <path d="M0 -14 L8 -4 L4 8 L-6 6 L-10 -4 Z" fill="#1a1f22" stroke="#c0d4e4" stroke-width="0.8"/>
    <circle r="3" fill="#e3f0ef"/>
  </g>

  <!-- book tucked under the opposite arm -->
  <g transform="translate(420 520)">
    <path d="M-26 -8 L26 -8 L26 36 L-26 36 Z"
          fill="#1a1714" stroke="#6b5d3e" stroke-width="0.8"/>
    <path d="M0 -8 L0 36" stroke="#6b5d3e" stroke-width="0.5"/>
    <path d="M-22 -2 L-2 -2" stroke="#8a7635" stroke-width="0.4" opacity="0.6"/>
    <path d="M-22 6 L-2 6" stroke="#8a7635" stroke-width="0.4" opacity="0.6"/>
  </g>

  <text x="300" y="770" text-anchor="middle" fill="#7a7468"
        font-family="Georgia, serif" font-size="14" font-style="italic" letter-spacing="2">
    Eloryn Vale
  </text>
</svg>
