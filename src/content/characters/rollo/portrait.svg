<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#1c1a16"/>
      <stop offset="100%" stop-color="#0e0d0b"/>
    </radialGradient>
    <radialGradient id="sunshaft" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#a68d42" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e0d0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#sunshaft)"/>

  <!-- small figure low in the frame -->
  <path d="M258 520 Q264 470 300 466 Q336 470 342 520 L360 780 L240 780 Z"
        fill="#14110e" stroke="#6b5d3e" stroke-width="1.2"/>

  <!-- wide-eyed svirfneblin head -->
  <ellipse cx="300" cy="470" rx="28" ry="32" fill="#1a1714"/>
  <circle cx="288" cy="470" r="3.5" fill="#d4c9a8"/>
  <circle cx="312" cy="470" r="3.5" fill="#d4c9a8"/>
  <circle cx="288" cy="470" r="1.3" fill="#14110e"/>
  <circle cx="312" cy="470" r="1.3" fill="#14110e"/>

  <!-- looking up — tilted slightly -->
  <path d="M290 488 Q300 492 310 488" stroke="#6b5d3e" stroke-width="0.9" fill="none"/>

  <!-- sun through the canopy, dim, high in the frame -->
  <circle cx="300" cy="120" r="28" fill="#ffd9a0" opacity="0.25"/>
  <circle cx="300" cy="120" r="12" fill="#ffe9bf" opacity="0.6"/>

  <!-- canopy silhouettes -->
  <g fill="#0a0c08" opacity="0.9">
    <path d="M0 220 L40 140 L90 220 L140 150 L200 230 L260 170 L320 240 L380 160 L440 220 L500 150 L560 230 L600 180 L600 0 L0 0 Z"/>
  </g>

  <text x="300" y="770" text-anchor="middle" fill="#7a7468"
        font-family="Georgia, serif" font-size="14" font-style="italic" letter-spacing="2">
    Rollo
  </text>
</svg>
