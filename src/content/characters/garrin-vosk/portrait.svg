<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1b1915"/>
      <stop offset="100%" stop-color="#0e0d0b"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- broad, grounded silhouette -->
  <path d="M190 300 Q200 200 300 190 Q400 200 410 300 L450 780 L150 780 Z"
        fill="#14110e" stroke="#6b5d3e" stroke-width="1.3"/>

  <!-- hooded, weathered face -->
  <path d="M240 200 Q300 150 360 200 L360 280 Q300 300 240 280 Z"
        fill="#0e0d0b" stroke="#6b5d3e" stroke-width="0.8"/>
  <ellipse cx="300" cy="250" rx="42" ry="36" fill="#1a1714"/>
  <line x1="285" y1="250" x2="293" y2="250" stroke="#8a8074" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="307" y1="250" x2="315" y2="250" stroke="#8a8074" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M285 272 Q300 282 315 272" stroke="#6b5d3e" stroke-width="1" fill="none"/>

  <!-- scar across cheek -->
  <line x1="273" y1="245" x2="282" y2="268" stroke="#6b5d3e" stroke-width="0.8" opacity="0.7"/>

  <!-- bow or staff hinted on shoulder -->
  <line x1="180" y1="240" x2="220" y2="560" stroke="#6b5d3e" stroke-width="2" opacity="0.7"/>

  <text x="300" y="770" text-anchor="middle" fill="#7a7468"
        font-family="Georgia, serif" font-size="14" font-style="italic" letter-spacing="2">
    Garrin Vosk
  </text>
</svg>
