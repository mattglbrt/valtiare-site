<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="lamp" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0.38"/>
      <stop offset="30%" stop-color="#a68d42" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#3a2418" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14120e"/>
      <stop offset="55%" stop-color="#0e0d0b"/>
      <stop offset="100%" stop-color="#08090a"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2419"/>
      <stop offset="100%" stop-color="#151108"/>
    </linearGradient>
    <radialGradient id="crystal" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e3f0ef" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#c0d4e4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1a1f22" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#room)"/>
  <rect width="100%" height="100%" fill="url(#lamp)"/>

  <!-- rough planks of a wooden table filling the lower half -->
  <rect x="0" y="600" width="1600" height="300" fill="url(#desk)"/>
  <g stroke="#15100a" stroke-width="1.5" opacity="0.8">
    <line x1="0" y1="660" x2="1600" y2="660"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="790" x2="1600" y2="790"/>
  </g>

  <!-- open tome, centered -->
  <g transform="translate(800 600)">
    <ellipse cx="0" cy="220" rx="350" ry="20" fill="#000" opacity="0.6"/>
    <path d="M-280 200 Q-280 0 -20 10 L-20 210 Z"
          fill="#1c1814" stroke="#6b5d3e" stroke-width="1.5"/>
    <path d="M280 200 Q280 0 20 10 L20 210 Z"
          fill="#1c1814" stroke="#6b5d3e" stroke-width="1.5"/>
    <path d="M-260 180 Q-260 20 -20 30 L-20 190 Z"
          fill="#e0d5b5" opacity="0.85"/>
    <path d="M260 180 Q260 20 20 30 L20 190 Z"
          fill="#e0d5b5" opacity="0.85"/>

    <g stroke="#3a2418" stroke-width="1" opacity="0.8" fill="none">
      <line x1="-240" y1="60" x2="-40" y2="60"/>
      <line x1="-240" y1="80" x2="-40" y2="80"/>
      <line x1="-240" y1="100" x2="-40" y2="100"/>
      <line x1="-240" y1="120" x2="-40" y2="120"/>
      <line x1="-240" y1="140" x2="-40" y2="140"/>
      <line x1="-240" y1="160" x2="-40" y2="160"/>
    </g>

    <g stroke="#7a2e3b" stroke-width="1.2" fill="none" opacity="0.9">
      <circle cx="140" cy="100" r="50"/>
      <circle cx="140" cy="100" r="36"/>
      <circle cx="140" cy="100" r="22"/>
      <line x1="140" y1="50" x2="140" y2="150"/>
      <line x1="90" y1="100" x2="190" y2="100"/>
      <line x1="104" y1="64" x2="176" y2="136"/>
      <line x1="176" y1="64" x2="104" y2="136"/>
    </g>
    <g fill="#7a2e3b" opacity="0.8">
      <circle cx="140" cy="50" r="2"/>
      <circle cx="140" cy="150" r="2"/>
      <circle cx="90" cy="100" r="2"/>
      <circle cx="190" cy="100" r="2"/>
    </g>
  </g>

  <!-- staff leaning diagonally across the desk, emerging from the lower right -->
  <line x1="1540" y1="880" x2="540" y2="380" stroke="#4a3a20" stroke-width="10" stroke-linecap="round"/>
  <line x1="1540" y1="880" x2="540" y2="380" stroke="#6b5d3e" stroke-width="4" stroke-linecap="round"/>
  <line x1="1540" y1="880" x2="540" y2="380" stroke="#8a7635" stroke-width="1.2" opacity="0.7"/>

  <!-- crystalline staff head, glowing pale and cold -->
  <g transform="translate(540 380)">
    <circle r="56" fill="url(#crystal)"/>
    <g fill="#1a1f22" stroke="#c0d4e4" stroke-width="1">
      <path d="M0 -34 L18 -10 L10 18 L-14 14 L-24 -8 Z"/>
      <path d="M-8 -18 L4 -22 L10 -6 L-2 0 Z" fill="#2a3238"/>
    </g>
    <circle r="5" fill="#e3f0ef"/>
    <g stroke="#c0d4e4" stroke-width="0.8" opacity="0.5" fill="none">
      <line x1="-60" y1="0" x2="-80" y2="0"/>
      <line x1="60" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="-60" x2="0" y2="-80"/>
      <line x1="-42" y1="-42" x2="-58" y2="-58"/>
      <line x1="42" y1="-42" x2="58" y2="-58"/>
    </g>
  </g>

  <!-- small oil lamp on the far corner of the desk -->
  <g transform="translate(1260 600)">
    <ellipse cx="0" cy="8" rx="22" ry="4" fill="#000" opacity="0.5"/>
    <path d="M-14 0 L-14 -14 L14 -14 L14 0 Z" fill="#1a1714" stroke="#6b5d3e" stroke-width="0.8"/>
    <circle cx="0" cy="-22" r="5" fill="#ffd9a0"/>
    <circle cx="0" cy="-22" r="12" fill="#ffd9a0" opacity="0.3"/>
    <circle cx="0" cy="-22" r="22" fill="#a68d42" opacity="0.15"/>
  </g>

  <!-- faint smoke / floating motes of dust -->
  <g fill="#d4c9a8" opacity="0.35">
    <circle cx="700" cy="320" r="1"/>
    <circle cx="820" cy="260" r="1.2"/>
    <circle cx="940" cy="300" r="0.9"/>
    <circle cx="1080" cy="240" r="1"/>
    <circle cx="600" cy="200" r="0.9"/>
    <circle cx="480" cy="280" r="1.1"/>
  </g>
</svg>
