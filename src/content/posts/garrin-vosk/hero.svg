<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1c17"/>
      <stop offset="60%" stop-color="#14110e"/>
      <stop offset="100%" stop-color="#0a0a08"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2cf" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#ffd9a0" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#a68d42" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3a2418" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#sky)"/>

  <!-- layered forest silhouettes -->
  <g fill="#07090a">
    <path d="M0 900 L0 120 L60 60 L120 200 L180 80 L240 220 L300 120 L360 240 L420 140 L480 260 L540 160 L600 280 L660 160 L720 300 L780 160 L820 140 L880 300 L940 160 L1000 280 L1060 160 L1120 260 L1180 140 L1240 240 L1300 120 L1360 220 L1420 80 L1480 200 L1540 60 L1600 120 L1600 900 Z"/>
  </g>
  <g fill="#0f1510" opacity="0.9">
    <path d="M0 900 L20 380 L80 440 L150 400 L220 450 L300 400 L380 460 L460 400 L540 460 L620 400 L700 470 L780 400 L860 470 L940 400 L1020 460 L1100 400 L1180 460 L1260 400 L1340 470 L1420 400 L1500 460 L1580 400 L1600 420 L1600 900 Z"/>
  </g>
  <g fill="#131a13" opacity="0.9">
    <path d="M0 900 L40 580 L120 620 L200 590 L280 620 L360 590 L440 620 L520 590 L600 620 L680 590 L760 620 L840 590 L920 620 L1000 590 L1080 620 L1160 590 L1240 620 L1320 590 L1400 620 L1480 590 L1560 620 L1600 600 L1600 900 Z"/>
  </g>

  <!-- pool of firelight on the ground -->
  <ellipse cx="810" cy="760" rx="520" ry="100" fill="url(#fire)" opacity="0.5"/>

  <!-- campfire -->
  <g transform="translate(810 740)">
    <ellipse cx="0" cy="18" rx="38" ry="8" fill="#000" opacity="0.55"/>
    <path d="M-18 16 L-10 -14 L0 -22 L10 -12 L18 18 Z" fill="#ffd9a0"/>
    <path d="M-10 14 L-4 -8 L4 -14 L10 -6 L12 14 Z" fill="#fff2cf"/>
    <circle cx="0" cy="-26" r="3" fill="#fff2cf" opacity="0.9"/>
    <line x1="-22" y1="20" x2="-40" y2="26" stroke="#6b5d3e" stroke-width="2"/>
    <line x1="24"  y1="20" x2="42" y2="26" stroke="#6b5d3e" stroke-width="2"/>
    <line x1="-18" y1="22" x2="10" y2="28" stroke="#6b5d3e" stroke-width="1.5"/>
  </g>

  <!-- Garrin seated by the fire -->
  <g transform="translate(680 710)">
    <path d="M-40 -10 Q-34 -90 0 -96 Q34 -90 40 -10 L56 120 L-56 120 Z"
          fill="#14110e" stroke="#6b5d3e" stroke-width="1.1"/>
    <ellipse cx="0" cy="-70" rx="18" ry="22" fill="#0e0d0b"/>
    <circle cx="-4" cy="-68" r="1.2" fill="#a68d42"/>
    <circle cx="4"  cy="-68" r="1.2" fill="#a68d42"/>
    <g stroke="#6b5d3e" stroke-width="0.6" opacity="0.7" fill="none">
      <line x1="-30" y1="20" x2="30" y2="20"/>
      <line x1="-28" y1="30" x2="28" y2="30"/>
      <line x1="-30" y1="40" x2="30" y2="40"/>
      <line x1="-28" y1="50" x2="28" y2="50"/>
    </g>
  </g>

  <!-- Barrow, curled at his side -->
  <g transform="translate(760 800)">
    <path d="M-60 20 Q-70 -10 -30 -24 L20 -28 L60 -20 Q80 0 70 20 L60 42 L-60 42 Z"
          fill="#14110e" stroke="#6b5d3e" stroke-width="1"/>
    <path d="M-80 -10 Q-90 -30 -62 -38 L-40 -32 L-30 -14 L-50 -2 L-74 -4 Z"
          fill="#14110e" stroke="#6b5d3e" stroke-width="0.8"/>
    <circle cx="-68" cy="-22" r="1.2" fill="#a68d42"/>
    <path d="M-80 -28 L-82 -46 L-68 -38 Z" fill="#14110e" stroke="#6b5d3e" stroke-width="0.6"/>
  </g>

  <!-- Triste, appearing at the tree line — a hint of her, cool shimmer -->
  <g transform="translate(1160 700)">
    <path d="M-22 -10 Q-18 -100 0 -108 Q18 -100 22 -10 L30 120 L-30 120 Z"
          fill="#14110e" stroke="#6b5d3e" stroke-width="1" opacity="0.85"/>
    <ellipse cx="0" cy="-80" rx="12" ry="16" fill="#0e0d0b"/>
    <g fill="#c0d4c4" opacity="0.55">
      <circle cx="-10" cy="-30" r="0.9"/>
      <circle cx="14" cy="-10" r="0.9"/>
      <circle cx="-14" cy="30" r="0.9"/>
      <circle cx="16" cy="60" r="0.9"/>
    </g>
  </g>
</svg>
