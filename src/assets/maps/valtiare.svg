<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2418"/>
      <stop offset="50%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0e0d0b"/>
    </linearGradient>
    <radialGradient id="warm" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#a68d42" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0e0d0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#parchment)"/>
  <rect width="100%" height="100%" fill="url(#warm)"/>

  <rect x="40" y="40" width="1520" height="1120" fill="none" stroke="#6b5d3e" stroke-width="2"/>
  <rect x="60" y="60" width="1480" height="1080" fill="none" stroke="#8a7635" stroke-width="0.6"/>

  <g stroke="#6b5d3e" stroke-width="1" opacity="0.6" fill="none" stroke-dasharray="4 6">
    <line x1="80" y1="600" x2="1520" y2="600"/>
    <line x1="800" y1="80" x2="800" y2="1120"/>
  </g>

  <g stroke="#6b5d3e" stroke-width="0.7" opacity="0.4" fill="none">
    <circle cx="800" cy="600" r="200"/>
    <circle cx="800" cy="600" r="340"/>
    <circle cx="800" cy="600" r="480"/>
  </g>

  <text x="800" y="520" text-anchor="middle" fill="#d4c9a8"
        font-family="Georgia, serif" font-size="74" font-style="italic" letter-spacing="10">
    THE KNOWN WORLD
  </text>
  <text x="800" y="600" text-anchor="middle" fill="#8a7635"
        font-family="Georgia, serif" font-size="28" letter-spacing="6">
    placeholder
  </text>
  <text x="800" y="680" text-anchor="middle" fill="#7a7468"
        font-family="Georgia, serif" font-size="20" font-style="italic">
    save the real map as
  </text>
  <text x="800" y="720" text-anchor="middle" fill="#a68d42"
        font-family="ui-monospace, Menlo, monospace" font-size="22">
    src/assets/maps/valtiare.png
  </text>

  <g fill="#6b5d3e" opacity="0.5">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="1520" cy="80" r="3"/>
    <circle cx="80" cy="1120" r="3"/>
    <circle cx="1520" cy="1120" r="3"/>
  </g>
</svg>
